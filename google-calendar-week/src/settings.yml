# Changes to this file will be overwritten by `trmnlp pull`
# https://docs.trmnl.com/go/plugins/custom-form-fields
# https://docs.trmnl.com/go/plugins/private

name: Google Calendar Week
id: google-calendar-week
strategy: polling
polling_verb: get
polling_url: '{{ calendar_ics_url }}'
refresh_interval: 15
no_screen_padding: 'yes'
dark_mode: 'no'
static_data: ''

custom_fields:
  - keyname: calendar_ics_url
    field_type: text
    name: Google Calendar iCal URL
    description: Secret iCal URL for the single Google Calendar you want to display.
  - keyname: calendar_label
    field_type: text
    name: Calendar Label
    description: Optional title shown in the TRMNL title bar.
    default: Google Calendar
